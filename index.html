<!DOCTYPE html>
<html>
<head>
  <title>KetoBite</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div id="header"></div>

<div class="bg-dark text-white text-center p-5">
  <h1>Delicious Keto Recipes 🍔</h1>
  <p>Healthy & Tasty Food</p>
</div>

<div class="container d-flex my-3">
  <input type="text" id="search" class="form-control" placeholder="Search...">

  <div class="container text-center gap-2 d-flex justify-content-end">
  <button class="btn btn-outline-danger" onclick="filterCategory('all')">All</button>
  <button class="btn btn-outline-danger" onclick="filterCategory('breakfast')">Breakfast</button>
  <button class="btn btn-outline-danger" onclick="filterCategory('dinner')">Dinner</button>
  <button class="btn btn-outline-danger" onclick="filterCategory('snacks')">Snacks</button>
</div>
</div>

<div class="container">
  <div class="row g-4" id="recipes"></div>
</div>

<div class="modal fade" id="recipeModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5 id="modalTitle"></h5>
      <div id="modalBody"></div>
      <button class="btn btn-danger mt-2" data-bs-dismiss="modal">Close</button>
    </div>
  </div>
</div>

<script src="./assets/js/bootsrap.bundle.min.js"></script>
<script type="module" src="assets/js/main.js"></script>
<script type="module" src="./assets/js/header.js"></script>

</body>
</html>
