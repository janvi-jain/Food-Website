<!DOCTYPE html>
<html>
<head>
  <title>Favorites</title>
  <link href="./assets/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

<div id="header"></div>

<div class="container my-4">
  <div class="row" id="favContainer"></div>
</div>

<script type="module" src="assets/js/main.js"></script>
<script type="module" src="./assets/js/header.js"></script>

<script type="module">
import { getFav } from "./assets/js/storage.js";

let fav = getFav();
let favBox = document.getElementById("favContainer");

fav.forEach(item => {
  favBox.innerHTML += `
  <div class="col-md-3">
    <div class="card">
      <img src="${item.image}">
      <div class="card-body">
        <h6>${item.recipe}</h6>
      </div>
    </div>
  </div>
  `;
});
</script>

</body>
</html>
